workflows:

  # ── Android APK 빌드 ──────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      java: 21
      node: 24
    scripts:
      - name: npm 의존성 설치
        script: npm ci
      - name: Capacitor 동기화
        script: npx cap sync android
      - name: APK 빌드
        script: cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

  # ── iOS 빌드 (Capacitor 8 + Swift Package Manager) ───────────
  ios-debug:
    name: iOS Debug (Simulator)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 24
    scripts:
      - name: npm 의존성 설치
        script: npm ci
      - name: iOS 플랫폼 추가
        script: npx cap add ios
      - name: Capacitor 웹 에셋 동기화
        script: npx cap sync ios
      - name: ios 디렉토리 구조 확인
        script: |
          echo "=== ios/ 구조 ==="
          find ios -maxdepth 4 -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Package.swift" -o -name "Podfile" 2>/dev/null
          echo "=== App 디렉토리 ==="
          ls -la ios/App/ 2>/dev/null || echo "ios/App 없음"
      - name: iOS 빌드 (서명 없음 — 시뮬레이터)
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          PROJECT=$(find ios -name "*.xcodeproj" | head -1)

          if [ -n "$WORKSPACE" ]; then
            echo "xcworkspace 사용: $WORKSPACE"
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              -resolvePackageDependencies
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              build
          elif [ -n "$PROJECT" ]; then
            echo "xcodeproj 사용: $PROJECT"
            xcodebuild \
              -project "$PROJECT" \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            echo "Xcode 프로젝트 파일을 찾을 수 없습니다"
            exit 1
          fi
    artifacts:
      - build/Build/Products/Debug-iphonesimulator/**/*.app

  # ── iOS 배포용 IPA (Apple Developer 계정 필요) ────────────────
  ios-release:
    name: iOS Release IPA (Ad Hoc)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 24
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.rurutek.gpstracker
    scripts:
      - name: npm 의존성 설치
        script: npm ci
      - name: iOS 플랫폼 추가
        script: npx cap add ios
      - name: Capacitor 웹 에셋 동기화
        script: npx cap sync ios
      - name: IPA 빌드 및 서명
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          xcode-project use-profiles
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            archive -archivePath build/App.xcarchive
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist
    artifacts:
      - build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - swh@rurutek.com
